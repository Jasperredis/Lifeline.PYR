0:
     title: How to Use this Tab
     version: 1.0
     date: x
     install: https://lifelinepyr.jasperredis.net
     desc: |
       This is the Others tab.
       Here, you can see previous
       updates.
       ---
       Press [Q] or to see the next
       oldest.
       Press [E] or to see the next
       newest.
       Press [X] to leave this tab and
       return to the most recent update.
       Remember: Q, E, X.
       ---
       Press [SPACE] to get on to the
       first page.
       Warning: If there is only one
       update availible, [SPACE] will
       do nothing.
